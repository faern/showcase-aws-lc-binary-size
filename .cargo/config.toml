# Minimize aws-lc-sys static lib's contribution to the final binary
# across every target this crate ships to. Exact savings per target are
# in README.md; rough magnitudes below.
#
# - -DOPENSSL_SMALL: drops large precomputed tables (P-256 ECDH/ECDSA,
#   Ed25519 base point). Saves ~350-500 KiB on every target. Slows
#   ECDSA P-256 verify a few x and Ed25519 signing 1.5-2x. Universal -
#   no platform-specific behavior.
# - -DMY_ASSEMBLER_IS_TOO_OLD_FOR_512AVX: drops AVX-512 AES-GCM/AES-XTS
#   asm in favor of AVX2/AES-NI. Every C-side use is nested inside an
#   outer OPENSSL_X86_64 guard, so it's a no-op on non-x86_64 targets.
#   Saves ~1.2 MiB on Linux/macOS x86_64. Only ~25 KiB on Windows MSVC
#   x86_64 because aws-lc's prebuilt NASM .obj for AVX-512 AES-GCM is
#   already empty (NASM historically lacked the relevant EVEX encoding).
#
# We don't set per-function/per-global section flags. cc-rs already adds
# -ffunction-sections / -fdata-sections on the GNU/Clang families for
# non-Apple-mobile targets, and on MSVC the equivalents (/Gy implied by
# /O1 or /O2; /Gw) turned out to be redundant under LTO - rust-lld
# already drops unused functions and globals.
#
# To rebuild WITHOUT these flags (e.g. to measure default aws-lc-rs),
# override on the command line:
#   AWS_LC_SYS_CFLAGS= cargo build --release ...
[env]
AWS_LC_SYS_CFLAGS = "-DOPENSSL_SMALL -DMY_ASSEMBLER_IS_TOO_OLD_FOR_512AVX"
